* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: "Microsoft YaHei", sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding: 16px 24px; max-width: 1280px; margin: 0 auto; }

h1 { text-align: center; font-size: 24px; margin-bottom: 6px; }
h1 .stroked-text { font-weight: 700; }
.subtitle { text-align: center; color: var(--muted); font-size: 12px; margin-bottom: 20px; }

.配置栏 { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }
.配置栏-行 { display: flex; align-items: center; gap: 8px; }
.配置栏-btn { border: 1px solid var(--line); background: var(--panel); color: #e6b422; font-size: 13px; font-weight: 700; padding: 5px 16px; border-radius: 4px; cursor: pointer; height: 30px; line-height: 1; flex-shrink: 0; }
.配置栏-btn:hover { border-color: #e6b422; background: rgba(230,180,34,0.08); }
.配置栏-btn-sm { border: 1px solid var(--line); background: var(--panel); color: var(--muted); font-size: 11px; padding: 3px 10px; border-radius: 4px; cursor: pointer; height: 30px; line-height: 1; flex-shrink: 0; }
.配置栏-btn-sm:hover { border-color: var(--text); color: var(--text); }
.配置栏-input { border: 1px solid var(--line); background: var(--panel); color: var(--text); font-size: 12px; padding: 5px 10px; border-radius: 4px; height: 30px; flex: 1; outline: none; min-width: 0; }
.配置栏-input:focus { border-color: #e6b422; }

.标签页栏 { display: flex; gap: 0; margin-bottom: 16px; border-bottom: 2px solid var(--line); }
.标签页-btn { background: none; border: none; color: var(--muted); font-size: 14px; font-weight: 700; padding: 8px 20px; cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -2px; transition: color 0.15s, border-color 0.15s; }
.标签页-btn:hover { color: var(--text); }
.标签页-btn.活跃 { color: #e6b422; border-bottom-color: #e6b422; }
.标签页-内容 { display: none; }
.标签页-内容.活跃 { display: block; }

.section-gap { margin-bottom: 16px; }

.intro-body { font-size: 13px; color: var(--muted); line-height: 1.8; padding: 12px; }
.intro-body strong { color: var(--text); }

.kw-item { margin-bottom: 12px; }
.kw-item:last-child { margin-bottom: 0; }
.kw-name { font-size: 16px; font-weight: bold; color: #00e5ff; margin-bottom: 3px; }
.kw-def { font-size: 12px; color: var(--text); line-height: 1.7; }
.kw-def strong { color: #e6b422; }

.计算网格 { display: flex; flex-direction: column; gap: 16px; }
.参数行容器 { display: flex; gap: 0; align-items: stretch; margin-bottom: 0; border-bottom: 1px solid var(--line); }
.参数行容器:last-child { border-bottom: none; }
.参数左侧 { display: flex; align-items: center; gap: 8px; flex-shrink: 0; width: 490px; padding: 8px 12px; }
.参数标签 { font-size: 16px; color: #00e5ff; font-weight: 700; flex-shrink: 0; width: 140px; }
.参数右侧 { display: flex; align-items: center; gap: 4px; flex-shrink: 0; }
.参数值 { font-size: 18px; font-weight: 700; color: #00e5ff; width: 68px; text-align: right; flex-shrink: 0; }
.参数单位 { font-size: 18px; color: #1de9b6; width: 140px; text-align: left; white-space: nowrap; flex-shrink: 0; }
.参数描述 { font-size: 13px; color: var(--text); line-height: 1.6; flex: 1; padding: 8px 12px 8px 16px; border-left: 1px solid var(--line); overflow-wrap: break-word; word-break: break-word; }
.参数分割线 { border: none; margin: 12px 0 0 0; }
.结果分割线 { border: none; margin: 12px 0 0 0; }
.结果行容器 { display: flex; gap: 0; align-items: stretch; border-bottom: 1px solid var(--line); }
.结果行容器:last-child { border-bottom: none; }
.结果左侧 { display: flex; flex-direction: column; gap: 2px; flex-shrink: 0; width: 490px; padding: 8px 12px; }
.结果标签 { font-size: 16px; color: #00e5ff; font-weight: 700; text-align: center; width: 100%; margin-bottom: 2px; }
.结果算式 { font-size: 14px; color: #4caf50; font-weight: 700; text-align: center; width: 100%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

.结果公式 { font-size: 12px; color: var(--muted); text-align: center; word-break: break-all; }
.结果公式 .kw { color: #e6b422; font-weight: 600; }
.结果公式 .sym { color: #e6b422; font-weight: 600; }
.结果公式 .frac { display: inline-flex; flex-direction: column; align-items: center; vertical-align: middle; margin: 0 3px; line-height: 1.3; }
.结果公式 .frac-num { padding: 0 4px 1px; border-bottom: 1px solid var(--muted); }
.结果公式 .frac-den { padding: 1px 4px 0; }
.RMT三栏 { display: flex; gap: 12px; align-items: stretch; }
.RMT栏 { flex: 1; min-width: 0; display: flex; flex-direction: column; }
.RMT栏头 { font-size: 16px; font-weight: 700; text-align: center; padding: 10px 8px; border-bottom: 2px solid var(--line); }
.RMT对比表 { width: 100%; border-collapse: collapse; flex: 1; }
.RMT对比表 td { font-size: 13px; padding: 6px 8px; border-bottom: 1px solid var(--line); vertical-align: top; }
.RMT对比表 .rmt指标 { color: #00e5ff; font-weight: 700; text-align: left; white-space: nowrap; }
.RMT对比表 .rmt值 { font-size: 16px; font-weight: 700; color: #4caf50; text-align: right; }
.RMT对比表 .rmt描述 { font-size: 11px; color: var(--muted); line-height: 1.4; }
.RMT对比表 .rmt公式 { font-size: 11px; color: #90caf9; font-style: italic; line-height: 1.4; }
.RMT对比表 .rmt算式 { font-size: 11px; color: var(--muted); padding-top: 2px; }
.RMT对比表 .rmt值行 td { border-bottom: none; }
.RMT对比表 .rmt算式行 td { border-top: none; padding-top: 0; }
.RMT对比表 .rmt倍数 { font-size: 12px; font-weight: 700; color: #e6b422; text-align: right; }
.结果描述 { font-size: 13px; color: var(--text); line-height: 1.6; flex: 1; padding: 8px 12px; border-left: 1px solid var(--line); overflow-wrap: break-word; word-break: break-word; }

.顶部栏 { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
.访问计数器 { font-size: 11px; color: var(--muted); }
.访问计数器 span { color: #e6b422; font-weight: 700; font-size: 13px; }
.语言切换 { display: flex; gap: 4px; }
.语言切换 button { border: 1px solid var(--line); background: var(--panel); color: var(--muted); font-size: 11px; padding: 3px 10px; border-radius: 4px; cursor: pointer; height: 26px; line-height: 1; }
.语言切换 button:hover { border-color: var(--text); color: var(--text); }
.语言切换 button.active { border-color: #e6b422; color: #e6b422; background: rgba(230,180,34,0.08); }

.舆论攻防区 { display: flex; flex-direction: column; gap: 16px; }
.舆论导语 { font-size: 15px; color: var(--text); line-height: 1.8; padding: 12px; background: var(--panel); border-radius: 6px; border-left: 3px solid #e6b422; }
.舆论导语 strong { color: #e6b422; }
.舆论分类 { margin-bottom: 0; }
.舆论分类头 { display: flex; align-items: baseline; gap: 10px; padding: 10px 12px; background: var(--panel); border-radius: 6px 6px 0 0; border-bottom: 2px solid var(--line); }
.舆论分类名 { font-size: 18px; font-weight: 700; color: #00e5ff; }
.舆论分类描述 { font-size: 14px; color: var(--muted); line-height: 1.5; }
.舆论表 { width: 100%; border-collapse: collapse; table-layout: fixed; }
.舆论表 th { font-size: 15px; font-weight: 700; color: #ff5252; padding: 8px 10px; border-bottom: 2px solid var(--line); text-align: left; background: var(--panel); }
.舆论表 th:nth-child(1) { width: 18%; }
.舆论表 th:nth-child(2) { width: 82%; }
.舆论表 td { font-size: 15px; padding: 8px 10px; border-bottom: 1px solid var(--line); vertical-align: top; line-height: 1.6; }
.舆论表 tr:last-child td { border-bottom: none; }
.舆论类型 { color: #00e5ff; font-weight: 700; white-space: nowrap; }
.舆论详解 { color: var(--text); line-height: 1.7; }
</style>

  function recalc() {
    var ticketCost = soloInputs["单张门票成本"].getValue();
    var ticketTime = soloInputs["单张门票耗时"].getValue();
    var stratIncome = soloInputs["单次策略收益"].getValue();

    var dailyMinutes = soloInputs["拟每日游玩时长"].getValue();

    var atlasCost = soloInputs["异界开拓成本"].getValue();
    var seasonDays = soloInputs["拟每赛季游玩日"].getValue();

    var cycleTime = ticketTime + stratTime;
    var dailyCycles = cycleTime > 0 ? dailyMinutes / cycleTime : 0;

    var prepTotalMinutes = buildTime + atlasTime;
    var prepDays = dailyMinutes > 0 ? prepTotalMinutes / dailyMinutes : 0;
    var paybackDays = dailyProfit > 0 ? prepDays + totalFixedCost / dailyProfit : Infinity;
    var effectiveDays = Math.max(0, seasonDays - prepDays);
    var seasonProfit = dailyProfit * effectiveDays;
    var seasonNet = seasonProfit - totalFixedCost;
    var hourlyProfit = dailyMinutes > 0 ? dailyProfit / (dailyMinutes / 60) : 0;

    if (dailyCycles > 0) {
      resultEls["res_dailyCycles"].innerHTML = dailyMinutes + " ÷ (" + ticketTime + " + " + stratTime + ")  =  <span class='结果值'>" + dailyCycles.toFixed(1) + "</span><span class='结果单位'> " + t('unitTimes') + "</span>";

    } else {
      resultEls["res_dailyRoi"].textContent = "—";

  function copyToClipboard(text) {
    var ta = document.createElement("textarea");
    ta.value = text;
    ta.style.position = "fixed";
    ta.style.left = "-9999px";
    document.body.appendChild(ta);
    ta.select();
    try { document.execCommand("copy"); } catch (e) {}
    document.body.removeChild(ta);
  }

  function exportConfig() {
    var values = allParamKeys.map(function(k) {
      var inp = allInputs[k];
      return inp ? inp.getValue() : 0;

    var raw = values.join(",");
    var key = btoa(raw);
    configBar.exportInput.value = key;
    try {
      navigator.clipboard.writeText(key).catch(function() { copyToClipboard(key); });
    } catch (e) {
      copyToClipboard(key);
    }
  }

  function importConfig() {
    var key = configBar.importInput.value.trim();
    if (!key) return;
    try {
      var raw = atob(key);
      var values = raw.split(",");
      if (values.length < paramKeys.length) {
        paramKeys.forEach(function(k, i) {
          if (values[i] !== undefined && allInputs[k]) {
            allInputs[k].setValue(parseFloat(values[i]));

        });

    function recalcTeam() {
      var sv = soloValues;
      if (!sv) return;

      var teamCount = teamInputs.teamInput.getValue();
      var costCoeff = teamInputs.costInput.getValue();
      var atlasCoeff = teamInputs.atlasInput.getValue();
      var ticketCoeff = teamInputs.ticketInput.getValue();
      var ticketTimeCoeff = teamInputs.ticketTimeRow.input.getValue();
      var stratTimeCoeff = teamInputs.stratTimeRow.input.getValue();
      var ratioPercent = teamInputs.ratioInput.getValue();
      var dropPoolCoeff = teamInputs.dropPoolInput.getValue();

      var m = (mode === "multi") ? teamCount : 1;
      var teamCycleTime = sv.ticketTime * ticketTimeCoeff + sv.stratTime * stratTimeCoeff;
      var teamDailyCycles = teamCycleTime > 0 ? sv.dailyMinutes / teamCycleTime : 0;
      var teamDailyInput = teamDailyCycles * sv.ticketCost * ticketCoeff * m;
      var teamDailyOutput = teamDailyCycles * sv.stratIncome * (ratioPercent / 100) * dropPoolCoeff * m;
      var teamDailyProfit = teamDailyOutput - teamDailyInput;
      var teamDailyRoi = teamDailyInput > 0 ? teamDailyOutput / teamDailyInput : 0;
      var teamFixedCost = (sv.buildCost * costCoeff + sv.atlasCost * atlasCoeff) * m;
      var teamPaybackDays = teamDailyProfit > 0 ? sv.prepDays + teamFixedCost / teamDailyProfit : Infinity;
      var teamHourlyProfit = sv.dailyMinutes > 0 ? teamDailyProfit / (sv.dailyMinutes / 60) : 0;
      var teamSeasonProfit = teamDailyProfit * sv.effectiveDays;
      var teamSeasonNet = teamSeasonProfit - teamFixedCost;

      if (mode === "multi") {
        multiValues = {
          dailyProfit: teamDailyProfit, hourlyProfit: teamHourlyProfit,
          fixedCost: teamFixedCost, dailyCycles: teamDailyCycles,
          dailyOutput: teamDailyOutput, dailyInput: teamDailyInput
        };
      } else {
        partyValues = {
          dailyProfit: teamDailyProfit, hourlyProfit: teamHourlyProfit,
          fixedCost: teamFixedCost, dailyCycles: teamDailyCycles,
          dailyOutput: teamDailyOutput, dailyInput: teamDailyInput
        };
      }

      if (teamDailyCycles > 0) {
        resultEls["team_dailyCycles"].innerHTML = sv.dailyMinutes.toFixed(0) + " ÷ (" + sv.ticketTime.toFixed(0) + " × " + ticketTimeCoeff + " + " + sv.stratTime.toFixed(0) + " × " + stratTimeCoeff + ")  =  <span class='结果值'>" + teamDailyCycles.toFixed(1) + "</span><span class='结果单位'> 次</span>";
      } else {
        resultEls["team_dailyCycles"].textContent = "—";
      }

      if (teamDailyCycles > 0) {
        var inputExpr = teamDailyCycles.toFixed(1) + " × " + sv.ticketCost + " × " + ticketCoeff;
        if (m > 1) inputExpr += " × " + m;
        resultEls["team_dailyInput"].innerHTML = inputExpr + "  =  <span class='结果值'>" + teamDailyInput.toFixed(1) + "</span><span class='结果单位'> " + t('unitDivine') + "</span>";
      } else {
        resultEls["team_dailyInput"].textContent = "—";
      }

      if (teamDailyCycles > 0) {
        var outputExpr = teamDailyCycles.toFixed(1) + " × " + sv.stratIncome + " × " + ratioPercent + "%" + " × " + dropPoolCoeff;
        if (m > 1) outputExpr += " × " + m;
        resultEls["team_dailyOutput"].innerHTML = outputExpr + "  =  <span class='结果值'>" + teamDailyOutput.toFixed(1) + "</span><span class='结果单位'> " + t('unitDivine') + "</span>";
      } else {
        resultEls["team_dailyOutput"].textContent = "—";
      }

      if (teamDailyCycles > 0) {
        resultEls["team_dailyProfit"].innerHTML = teamDailyOutput.toFixed(1) + " - " + teamDailyInput.toFixed(1) + "  =  <span class='结果值'>" + teamDailyProfit.toFixed(1) + "</span><span class='结果单位'> " + t('unitDivine') + "</span>";
      } else {
        resultEls["team_dailyProfit"].textContent = "—";
      }

      if (teamDailyRoi > 0) {
        resultEls["team_dailyRoi"].innerHTML = teamDailyOutput.toFixed(1) + " ÷ " + teamDailyInput.toFixed(1) + "  =  <span class='结果值'>1:" + teamDailyRoi.toFixed(2) + "</span>";
      } else {
        resultEls["team_dailyRoi"].textContent = "—";
      }

      if (isFinite(teamPaybackDays) && teamPaybackDays > 0) {
        var paybackExpr = sv.prepDays.toFixed(1) + " + (" + (sv.buildCost * costCoeff).toFixed(1) + " + " + (sv.atlasCost * atlasCoeff).toFixed(1) + ")";
        if (m > 1) paybackExpr += " × " + m;
        paybackExpr += " ÷ " + teamDailyProfit.toFixed(1);
        resultEls["team_paybackDays"].innerHTML = paybackExpr + "  =  <span class='结果值'>" + teamPaybackDays.toFixed(1) + "</span><span class='结果单位'> " + t('unitDay') + "</span>";
      } else {
        resultEls["team_paybackDays"].textContent = t('errNoBalance');
      }

      if (teamDailyCycles > 0) {
        resultEls["team_hourlyProfit"].innerHTML = teamDailyProfit.toFixed(1) + " ÷ (" + sv.dailyMinutes.toFixed(0) + " ÷ 60)  =  <span class='结果值'>" + teamHourlyProfit.toFixed(1) + "</span><span class='结果单位'> 神圣石</span>";
      } else {
        resultEls["team_hourlyProfit"].textContent = "—";
      }

      if (teamDailyCycles > 0 && sv.seasonDays > 0) {
        resultEls["team_seasonProfit"].innerHTML = teamDailyProfit.toFixed(1) + " × (" + sv.seasonDays + " - " + sv.prepTotalMinutes.toFixed(0) + " ÷ " + sv.dailyMinutes.toFixed(0) + ")  =  <span class='结果值'>" + teamSeasonProfit.toFixed(1) + "</span><span class='结果单位'> 神圣石</span>";
      } else {
        resultEls["team_seasonProfit"].textContent = "—";
      }

      if (teamDailyCycles > 0 && sv.seasonDays > 0) {
        resultEls["team_seasonNet"].innerHTML = teamSeasonProfit.toFixed(1) + " - " + teamFixedCost.toFixed(1) + "  =  <span class='结果值'>" + teamSeasonNet.toFixed(1) + "</span><span class='结果单位'> 神圣石</span>";
      } else {
        resultEls["team_seasonNet"].textContent = "—";
      }

      if (sv.dailyProfit > 0 && teamDailyCycles > 0) {
        resultEls["team_comp_dailyProfit"].innerHTML = teamDailyProfit.toFixed(1) + " ÷ " + sv.dailyProfit.toFixed(1) + "  =  <span class='结果值'>×" + (teamDailyProfit / sv.dailyProfit).toFixed(2) + "</span>";
      } else {
        resultEls["team_comp_dailyProfit"].textContent = "—";
      }

      if (isFinite(teamPaybackDays) && teamPaybackDays > 0 && isFinite(sv.paybackDays) && sv.paybackDays > 0) {
        var diffPayback = teamPaybackDays - sv.paybackDays;
        resultEls["team_comp_payback"].innerHTML = teamPaybackDays.toFixed(1) + " - " + sv.paybackDays.toFixed(1) + "  =  <span class='结果值'>" + (diffPayback >= 0 ? "+" : "") + diffPayback.toFixed(1) + "</span><span class='结果单位'> 天</span>";
      } else {
        resultEls["team_comp_payback"].textContent = "—";
      }

      if (sv.seasonNet > 0 && teamDailyCycles > 0) {
        resultEls["team_comp_seasonNet"].innerHTML = teamSeasonNet.toFixed(1) + " ÷ " + sv.seasonNet.toFixed(1) + "  =  <span class='结果值'>×" + (teamSeasonNet / sv.seasonNet).toFixed(2) + "</span>";
      } else {
        resultEls["team_comp_seasonNet"].textContent = "—";
      }

      if (sv.hourlyProfit > 0 && teamDailyCycles > 0) {
        resultEls["team_comp_hourlyProfit"].innerHTML = teamHourlyProfit.toFixed(1) + " ÷ " + sv.hourlyProfit.toFixed(1) + "  =  <span class='结果值'>×" + (teamHourlyProfit / sv.hourlyProfit).toFixed(2) + "</span>";
      } else {
        resultEls["team_comp_hourlyProfit"].textContent = "—";
      }
    }

    return { panel: panel, recalc: recalcTeam };
  }

    var rh = resultPanel.el.querySelector(".panel-head");
    rh.style.color = getColorHex("red", 400);
    rh.style.fontSize = "18px";
    rh.style.fontWeight = "700";

    var metricDefs = [
      { key: "hourly", label: "拟每小时通货收益", desc: "扣除门票消耗后的每小时神圣石净收益", formula: "(日产出 - 日消耗) ÷ 日游戏时长" },
      { key: "hourlyRmt", label: "拟每小时RMT收益", desc: "按当前天数汇率折算的每小时人民币收益", formula: "每小时通货收益 × 第N天汇率" },

    function recalcRmt() {
      var sv = soloValues;
      if (!sv) return;

      var rate = rateRow.input.getValue();
      var decay = decayRow.input.getValue();
      var currentDay = currentDayRow.input.getValue();

      var currentRate = rate * Math.pow(decay, currentDay - 1);

      function seasonRmtCalc(dailyProfit, prepDays, effectiveDays) {
        if (Math.abs(decay - 1) < 1e-9) {
          return dailyProfit * rate * effectiveDays;
        }
        return dailyProfit * rate * Math.pow(decay, prepDays) * (1 - Math.pow(decay, effectiveDays)) / (1 - decay);
      }

      function seasonRmtExpr(dailyProfit, prepDays, effectiveDays) {
        if (Math.abs(decay - 1) < 1e-9) {
          return dailyProfit.toFixed(1) + " × " + rate + " × " + effectiveDays.toFixed(0);
        }
        return dailyProfit.toFixed(1) + " × " + rate + " × " + decay + "^" + prepDays.toFixed(1) + " × (1-" + decay + "^" + effectiveDays.toFixed(0) + ")÷(1-" + decay + ")";
      }

      rmtCells["hourly_solo"].val.innerHTML = sv.hourlyProfit.toFixed(2) + "<span class='结果单位'> 神圣石</span>";
      rmtCells["hourly_solo"].expr.textContent = sv.dailyProfit.toFixed(1) + " ÷ " + (sv.dailyMinutes / 60).toFixed(1) + "h";

      var soloHourlyRmt = sv.hourlyProfit * currentRate;
      rmtCells["hourlyRmt_solo"].val.innerHTML = soloHourlyRmt.toFixed(2) + "<span class='结果单位'> 元</span>";
      rmtCells["hourlyRmt_solo"].expr.textContent = sv.hourlyProfit.toFixed(2) + " × " + currentRate.toFixed(4) + "(第" + currentDay + "天汇率)";

      var soloDailyRmt = sv.dailyProfit * currentRate;
      rmtCells["dailyRmt_solo"].val.innerHTML = soloDailyRmt.toFixed(2) + "<span class='结果单位'> 元</span>";
      rmtCells["dailyRmt_solo"].expr.textContent = sv.dailyProfit.toFixed(1) + " × " + currentRate.toFixed(4) + "(第" + currentDay + "天汇率)";

      var soloSeasonRmt = seasonRmtCalc(sv.dailyProfit, sv.prepDays, sv.effectiveDays);
      rmtCells["seasonRmt_solo"].val.innerHTML = soloSeasonRmt.toFixed(2) + "<span class='结果单位'> 元</span>";
      rmtCells["seasonRmt_solo"].expr.textContent = seasonRmtExpr(sv.dailyProfit, sv.prepDays, sv.effectiveDays);

      var soloCostRmt = sv.totalFixedCost * rate;
      var soloSeasonNetRmt = soloSeasonRmt - soloCostRmt;
      rmtCells["seasonNetRmt_solo"].val.innerHTML = soloSeasonNetRmt.toFixed(2) + "<span class='结果单位'> 元</span>";
      rmtCells["seasonNetRmt_solo"].expr.textContent = soloSeasonRmt.toFixed(1) + " - " + sv.totalFixedCost.toFixed(1) + "×" + rate + "=" + soloCostRmt.toFixed(1);

      if (partyValues) {
        rmtCells["hourly_party"].val.innerHTML = partyValues.hourlyProfit.toFixed(2) + "<span class='结果单位'> 神圣石</span>";
        rmtCells["hourly_party"].expr.textContent = partyValues.dailyProfit.toFixed(1) + " ÷ " + (sv.dailyMinutes / 60).toFixed(1) + "h";
        rmtCells["hourly_party"].ratio.textContent = sv.hourlyProfit > 0 ? "×" + (partyValues.hourlyProfit / sv.hourlyProfit).toFixed(2) : "";

        var partyHourlyRmt = partyValues.hourlyProfit * currentRate;
        rmtCells["hourlyRmt_party"].val.innerHTML = partyHourlyRmt.toFixed(2) + "<span class='结果单位'> 元</span>";
        rmtCells["hourlyRmt_party"].expr.textContent = partyValues.hourlyProfit.toFixed(2) + " × " + currentRate.toFixed(4) + "(第" + currentDay + "天汇率)";
        rmtCells["hourlyRmt_party"].ratio.textContent = soloHourlyRmt > 0 ? "×" + (partyHourlyRmt / soloHourlyRmt).toFixed(2) : "";

        var partyDailyRmt = partyValues.dailyProfit * currentRate;
        rmtCells["dailyRmt_party"].val.innerHTML = partyDailyRmt.toFixed(2) + "<span class='结果单位'> 元</span>";
        rmtCells["dailyRmt_party"].expr.textContent = partyValues.dailyProfit.toFixed(1) + " × " + currentRate.toFixed(4) + "(第" + currentDay + "天汇率)";
        rmtCells["dailyRmt_party"].ratio.textContent = soloDailyRmt > 0 ? "×" + (partyDailyRmt / soloDailyRmt).toFixed(2) : "";

        var partySeasonRmt = seasonRmtCalc(partyValues.dailyProfit, sv.prepDays, sv.effectiveDays);
        rmtCells["seasonRmt_party"].val.innerHTML = partySeasonRmt.toFixed(2) + "<span class='结果单位'> 元</span>";
        rmtCells["seasonRmt_party"].expr.textContent = seasonRmtExpr(partyValues.dailyProfit, sv.prepDays, sv.effectiveDays);
        rmtCells["seasonRmt_party"].ratio.textContent = soloSeasonRmt > 0 ? "×" + (partySeasonRmt / soloSeasonRmt).toFixed(2) : "";

        var partyCostRmt = partyValues.fixedCost * rate;

        rmtCells["seasonNetRmt_party"].val.innerHTML = partySeasonNetRmt.toFixed(2) + "<span class='结果单位'> 元</span>";
        rmtCells["seasonNetRmt_party"].expr.textContent = partySeasonRmt.toFixed(1) + " - " + partyValues.fixedCost.toFixed(1) + "×" + rate + "=" + partyCostRmt.toFixed(1);
        rmtCells["seasonNetRmt_party"].ratio.textContent = soloSeasonNetRmt > 0 ? "×" + (partySeasonNetRmt / soloSeasonNetRmt).toFixed(2) : "";
      }

      if (multiValues) {
        rmtCells["hourly_multi"].val.innerHTML = multiValues.hourlyProfit.toFixed(2) + "<span class='结果单位'> 神圣石</span>";
        rmtCells["hourly_multi"].expr.textContent = multiValues.dailyProfit.toFixed(1) + " ÷ " + (sv.dailyMinutes / 60).toFixed(1) + "h";
        rmtCells["hourly_multi"].ratio.textContent = sv.hourlyProfit > 0 ? "×" + (multiValues.hourlyProfit / sv.hourlyProfit).toFixed(2) : "";

        var multiHourlyRmt = multiValues.hourlyProfit * currentRate;
        rmtCells["hourlyRmt_multi"].val.innerHTML = multiHourlyRmt.toFixed(2) + "<span class='结果单位'> 元</span>";
        rmtCells["hourlyRmt_multi"].expr.textContent = multiValues.hourlyProfit.toFixed(2) + " × " + currentRate.toFixed(4) + "(第" + currentDay + "天汇率)";
        rmtCells["hourlyRmt_multi"].ratio.textContent = soloHourlyRmt > 0 ? "×" + (multiHourlyRmt / soloHourlyRmt).toFixed(2) : "";

        var multiDailyRmt = multiValues.dailyProfit * currentRate;
        rmtCells["dailyRmt_multi"].val.innerHTML = multiDailyRmt.toFixed(2) + "<span class='结果单位'> 元</span>";
        rmtCells["dailyRmt_multi"].expr.textContent = multiValues.dailyProfit.toFixed(1) + " × " + currentRate.toFixed(4) + "(第" + currentDay + "天汇率)";
        rmtCells["dailyRmt_multi"].ratio.textContent = soloDailyRmt > 0 ? "×" + (multiDailyRmt / soloDailyRmt).toFixed(2) : "";

        rmtCells["seasonNetRmt_multi"].ratio.textContent = soloSeasonNetRmt > 0 ? "×" + (multiSeasonNetRmt / soloSeasonNetRmt).toFixed(2) : "";
      }

      while (chartGroup.firstChild) chartGroup.removeChild(chartGroup.firstChild);
      while (legendGroup.firstChild) legendGroup.removeChild(legendGroup.firstChild);

      var seasonDays = sv.seasonDays;
      var padL = 55, padR = 15, padT = 20, padB = 35;
      var cw = 600 - padL - padR;
      var ch2 = 300 - padT - padB;

      var soloDaily = sv.dailyProfit;
      var partyDaily = partyValues ? partyValues.dailyProfit : 0;
      var multiDaily = multiValues ? multiValues.dailyProfit : 0;

      var maxVal = 0;
      var soloCum = 0, partyCum = 0, multiCum = 0;
      var soloData = [], partyData = [], multiData = [];
      for (var d = 1; d <= seasonDays; d++) {
        var dayRate = rate * Math.pow(decay, d - 1);
        if (d > sv.prepDays) {
          soloCum += soloDaily * dayRate;
          partyCum += partyDaily * dayRate;
          multiCum += multiDaily * dayRate;
        }
        soloData.push(soloCum);
        partyData.push(partyCum);
        multiData.push(multiCum);
        if (soloCum > maxVal) maxVal = soloCum;
        if (partyCum > maxVal) maxVal = partyCum;
        if (multiCum > maxVal) maxVal = multiCum;
      }
      if (maxVal <= 0) maxVal = 1;

      function makeLine(data, color) {
        var pts = [];
        for (var i = 0; i < data.length; i++) {
          var x = padL + (i / Math.max(1, seasonDays - 1)) * cw;
          var y = padT + ch2 - (data[i] / maxVal) * ch2;
          pts.push(x.toFixed(1) + "," + y.toFixed(1));
        }
        var pl = document.createElementNS("http://www.w3.org/2000/svg", "polyline");
        pl.setAttribute("points", pts.join(" "));
        pl.setAttribute("fill", "none");
        pl.setAttribute("stroke", color);
        pl.setAttribute("stroke-width", "2");
        pl.setAttribute("stroke-linejoin", "round");
        chartGroup.appendChild(pl);
      }

      for (var gi = 0; gi <= 4; gi++) {
        var gy = padT + (gi / 4) * ch2;
        var gl = document.createElementNS("http://www.w3.org/2000/svg", "line");

        gl.setAttribute("x2", padL + cw); gl.setAttribute("y2", gy);
        gl.setAttribute("stroke", "var(--line)"); gl.setAttribute("stroke-width", "0.5");
        chartGroup.appendChild(gl);
        var gt = document.createElementNS("http://www.w3.org/2000/svg", "text");
        gt.setAttribute("x", padL - 5); gt.setAttribute("y", gy + 4);
        gt.setAttribute("text-anchor", "end"); gt.setAttribute("fill", "var(--muted)");
        gt.setAttribute("font-size", "10");
        gt.textContent = (maxVal * (1 - gi / 4)).toFixed(0) + (gi === 0 ? " 元" : "");
        chartGroup.appendChild(gt);
      }

      for (var xi = 0; xi <= 4; xi++) {
        var xd = Math.round(seasonDays * xi / 4);
        var xx = padL + (xi / 4) * cw;
        var xl = document.createElementNS("http://www.w3.org/2000/svg", "line");
        xl.setAttribute("x1", xx); xl.setAttribute("y1", padT);
        xl.setAttribute("x2", xx); xl.setAttribute("y2", padT + ch2);
        xl.setAttribute("stroke", "var(--line)"); xl.setAttribute("stroke-width", "0.5");
        chartGroup.appendChild(xl);
        var xt = document.createElementNS("http://www.w3.org/2000/svg", "text");
        xt.setAttribute("x", xx); xt.setAttribute("y", padT + ch2 + 15);
        xt.setAttribute("text-anchor", "middle"); xt.setAttribute("fill", "var(--muted)");
        xt.setAttribute("font-size", "10");
        xt.textContent = "第" + xd + "天";
        chartGroup.appendChild(xt);
      }

      var axisLine = document.createElementNS("http://www.w3.org/2000/svg", "line");
      axisLine.setAttribute("x1", padL); axisLine.setAttribute("y1", padT);
      axisLine.setAttribute("x2", padL); axisLine.setAttribute("y2", padT + ch2);
      axisLine.setAttribute("stroke", "var(--text)"); axisLine.setAttribute("stroke-width", "1");
      chartGroup.appendChild(axisLine);
      var axisBottom = document.createElementNS("http://www.w3.org/2000/svg", "line");
      axisBottom.setAttribute("x1", padL); axisBottom.setAttribute("y1", padT + ch2);
      axisBottom.setAttribute("x2", padL + cw); axisBottom.setAttribute("y2", padT + ch2);
      axisBottom.setAttribute("stroke", "var(--text)"); axisBottom.setAttribute("stroke-width", "1");
      chartGroup.appendChild(axisBottom);

      makeLine(soloData, "#ff9800");
      makeLine(partyData, "#e6b422");
      makeLine(multiData, "#ab47bc");

      chartDataRef.solo = soloData;
      chartDataRef.party = partyData;
      chartDataRef.multi = multiData;
      chartDataRef.seasonDays = seasonDays;
      chartDataRef.padL = padL;
      chartDataRef.padR = padR;
      chartDataRef.cw = cw;

      var legends = [
        { label: t('tabSolo'), color: "#ff9800" },
        { label: t('tabParty'), color: "#e6b422" },
        { label: t('tabMulti'), color: "#ab47bc" }
      ];
      legends.forEach(function(lg, li) {
        var lx = padL + li * 120;
        var ly = padT + ch2 + 28;
        var lr = document.createElementNS("http://www.w3.org/2000/svg", "rect");
        lr.setAttribute("x", lx); lr.setAttribute("y", ly - 8);
        lr.setAttribute("width", "12"); lr.setAttribute("height", "4");
        lr.setAttribute("fill", lg.color);
        legendGroup.appendChild(lr);
        var lt = document.createElementNS("http://www.w3.org/2000/svg", "text");
        lt.setAttribute("x", lx + 16); lt.setAttribute("y", ly - 3);
        lt.setAttribute("fill", "var(--text)"); lt.setAttribute("font-size", "11");
        lt.textContent = lg.label;
        legendGroup.appendChild(lt);
      });

      while (netChartGroup.firstChild) netChartGroup.removeChild(netChartGroup.firstChild);
      while (netLegendGroup.firstChild) netLegendGroup.removeChild(netLegendGroup.firstChild);

      var soloCostRmt2 = sv.totalFixedCost * rate;
      var partyCostRmt2 = partyValues ? partyValues.fixedCost * rate : 0;
      var multiCostRmt2 = multiValues ? multiValues.fixedCost * rate : 0;

      var netMin = 0, netMax = 0;
      var soloNetData = [], partyNetData = [], multiNetData = [];
      for (var nd = 0; nd < seasonDays; nd++) {
        var sn = soloData[nd] - soloCostRmt2;
        var pn = partyData[nd] - partyCostRmt2;
        var mn = multiData[nd] - multiCostRmt2;
        soloNetData.push(sn);
        partyNetData.push(pn);
        multiNetData.push(mn);
        if (sn < netMin) netMin = sn;
        if (pn < netMin) netMin = pn;
        if (mn < netMin) netMin = mn;
        if (sn > netMax) netMax = sn;
        if (pn > netMax) netMax = pn;
        if (mn > netMax) netMax = mn;
      }
      if (netMax <= netMin) { netMax = netMin + 1; }
      var netRange = netMax - netMin;

      function netY(val) {
        return padT + ch2 - ((val - netMin) / netRange) * ch2;
      }

      function makeNetLine(data, color) {
        var pts = [];
        for (var ni = 0; ni < data.length; ni++) {
          var nx = padL + (ni / Math.max(1, seasonDays - 1)) * cw;
          var ny = netY(data[ni]);
          pts.push(nx.toFixed(1) + "," + ny.toFixed(1));
        }
        var npl = document.createElementNS("http://www.w3.org/2000/svg", "polyline");
        npl.setAttribute("points", pts.join(" "));
        npl.setAttribute("fill", "none");
        npl.setAttribute("stroke", color);
        npl.setAttribute("stroke-width", "2");
        npl.setAttribute("stroke-linejoin", "round");
        netChartGroup.appendChild(npl);
      }

      var zeroY = netY(0);
      if (zeroY > padT && zeroY < padT + ch2) {
        var zeroLine = document.createElementNS("http://www.w3.org/2000/svg", "line");
        zeroLine.setAttribute("x1", padL); zeroLine.setAttribute("y1", zeroY);
        zeroLine.setAttribute("x2", padL + cw); zeroLine.setAttribute("y2", zeroY);
        zeroLine.setAttribute("stroke", "#ff4444"); zeroLine.setAttribute("stroke-width", "1");
        zeroLine.setAttribute("stroke-dasharray", "4,3");
        netChartGroup.appendChild(zeroLine);
        var zeroLabel = document.createElementNS("http://www.w3.org/2000/svg", "text");
        zeroLabel.setAttribute("x", padL - 5); zeroLabel.setAttribute("y", zeroY + 4);
        zeroLabel.setAttribute("text-anchor", "end"); zeroLabel.setAttribute("fill", "#ff4444"); zeroLabel.setAttribute("font-size", "10");
        zeroLabel.textContent = "0";
        netChartGroup.appendChild(zeroLabel);
      }

      for (var ngi = 0; ngi <= 4; ngi++) {
        var ngy = padT + (ngi / 4) * ch2;
        var ngl = document.createElementNS("http://www.w3.org/2000/svg", "line");
        ngl.setAttribute("x1", padL); ngl.setAttribute("y1", ngy);
        ngl.setAttribute("x2", padL + cw); ngl.setAttribute("y2", ngy);
        ngl.setAttribute("stroke", "var(--line)"); ngl.setAttribute("stroke-width", "0.5");
        netChartGroup.appendChild(ngl);
        var ngt = document.createElementNS("http://www.w3.org/2000/svg", "text");
        ngt.setAttribute("x", padL - 5); ngt.setAttribute("y", ngy + 4);
        ngt.setAttribute("text-anchor", "end"); ngt.setAttribute("fill", "var(--muted)");
        ngt.setAttribute("font-size", "10");
        ngt.textContent = (netMax - ngi / 4 * netRange).toFixed(0) + (ngi === 0 ? " 元" : "");
        netChartGroup.appendChild(ngt);
      }

      for (var nxi = 0; nxi <= 4; nxi++) {
        var nxd = Math.round(seasonDays * nxi / 4);
        var nxx = padL + (nxi / 4) * cw;
        var nxl = document.createElementNS("http://www.w3.org/2000/svg", "line");
        nxl.setAttribute("x1", nxx); nxl.setAttribute("y1", padT);
        nxl.setAttribute("x2", nxx); nxl.setAttribute("y2", padT + ch2);
        nxl.setAttribute("stroke", "var(--line)"); nxl.setAttribute("stroke-width", "0.5");
        netChartGroup.appendChild(nxl);
        var nxt = document.createElementNS("http://www.w3.org/2000/svg", "text");
        nxt.setAttribute("x", nxx); nxt.setAttribute("y", padT + ch2 + 15);
        nxt.setAttribute("text-anchor", "middle"); nxt.setAttribute("fill", "var(--muted)");
        nxt.setAttribute("font-size", "10");
        nxt.textContent = "第" + nxd + "天";
        netChartGroup.appendChild(nxt);
      }

      var netAxisL = document.createElementNS("http://www.w3.org/2000/svg", "line");
      netAxisL.setAttribute("x1", padL); netAxisL.setAttribute("y1", padT);
      netAxisL.setAttribute("x2", padL); netAxisL.setAttribute("y2", padT + ch2);
      netAxisL.setAttribute("stroke", "var(--text)"); netAxisL.setAttribute("stroke-width", "1");
      netChartGroup.appendChild(netAxisL);
      var netAxisB = document.createElementNS("http://www.w3.org/2000/svg", "line");
      netAxisB.setAttribute("x1", padL); netAxisB.setAttribute("y1", padT + ch2);
      netAxisB.setAttribute("x2", padL + cw); netAxisB.setAttribute("y2", padT + ch2);
      netAxisB.setAttribute("stroke", "var(--text)"); netAxisB.setAttribute("stroke-width", "1");
      netChartGroup.appendChild(netAxisB);

      makeNetLine(soloNetData, "#ff9800");
      makeNetLine(partyNetData, "#e6b422");
      makeNetLine(multiNetData, "#ab47bc");

      netDataRef.solo = soloNetData;
      netDataRef.party = partyNetData;
      netDataRef.multi = multiNetData;
      netDataRef.seasonDays = seasonDays;
      netDataRef.padL = padL;
      netDataRef.padR = padR;
      netDataRef.cw = cw;

      legends.forEach(function(lg2, li2) {
        var lx2 = padL + li2 * 120;
        var ly2 = padT + ch2 + 28;
        var lr2 = document.createElementNS("http://www.w3.org/2000/svg", "rect");
        lr2.setAttribute("x", lx2); lr2.setAttribute("y", ly2 - 8);
        lr2.setAttribute("width", "12"); lr2.setAttribute("height", "4");
        lr2.setAttribute("fill", lg2.color);
        netLegendGroup.appendChild(lr2);
        var lt2 = document.createElementNS("http://www.w3.org/2000/svg", "text");
        lt2.setAttribute("x", lx2 + 16); lt2.setAttribute("y", ly2 - 3);
        lt2.setAttribute("fill", "var(--text)"); lt2.setAttribute("font-size", "11");
        lt2.textContent = lg2.label;
        netLegendGroup.appendChild(lt2);
      });
    }

    rateRow.addOnChange(recalcRmt);
    decayRow.addOnChange(recalcRmt);
    currentDayRow.addOnChange(recalcRmt);
    rmtRecalcFn = recalcRmt;

    allInputs["神圣石汇率"] = rateRow.input;
    allInputs["汇率衰减系数"] = decayRow.input;
    allInputs["当前赛季天数"] = currentDayRow.input;
  })();

  (function buildRhetoricTab() {

      section.appendChild(table);
      container.appendChild(section);
    });

    tabPanels["tab-rhetoric"].appendChild(container);
  })();

  switchTab("tab-solo");
  recalc();
}

(function initVisitCounter() {
  var el = document.getElementById("visitCount");
  if (!el) return;

  function updateLabel() {
    var labelEl = el.parentNode;
    var before = labelEl.firstChild;
    if (before && before.nodeType === 3) before.textContent = t('visitLabel');
    var after = el.nextSibling;
    if (after && after.nodeType === 3) after.textContent = ' ' + t('visitUnit');
  }
  updateLabel();

  fetch("https://api.counterapi.dev/v1/poe2calc/visits/up")
    .then(function(r) { return r.json(); })
    .then(function(data) {
      el.textContent = data.count.toLocaleString();
    });
})();

  configBar.copyBtn.textContent = t('copyBtn');
  configBar.importBtn.textContent = t('importBtn');
  configBar.pasteBtn.textContent = t('pasteBtn');
  configBar.exportInput.placeholder = t('exportPlaceholder');
  configBar.importInput.placeholder = t('importPlaceholder');
